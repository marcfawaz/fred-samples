version: v1

servers:
  # ── Bank Transfer sample ─────────────────────────────────────────────────────
  # Run: cd ../servers/mcp/python/bank_core_mcp_server && make run   (port 9801)
  # Run: cd ../servers/mcp/python/risk_guard_mcp_server && make run  (port 9802)

  - id: "mcp-bank-core-demo"
    name: "Bank Core Demo MCP"
    description: "Simulated banking core — account details, prepare and commit transfers"
    enabled: true
    transport: "streamable_http"
    url: "http://localhost:9801/mcp"
    sse_read_timeout: 5000
    auth_mode: "no_token"

  - id: "mcp-risk-guard-demo"
    name: "Risk Guard Demo MCP"
    description: "Simulated risk engine — KYC compliance check and transfer risk scoring"
    enabled: true
    transport: "streamable_http"
    url: "http://localhost:9802/mcp"
    sse_read_timeout: 5000
    auth_mode: "no_token"

  # ── Postal Tracking sample ───────────────────────────────────────────────────
  # Run: cd ../servers/mcp/python/postal_business_mcp_server && make run  (port 9797)
  # Run: cd ../servers/mcp/python/iot_tracking_mcp_server   && make run  (port 9798)

  - id: "mcp-postal-business-demo"
    name: "Postal Business Demo MCP"
    description: "Simulated postal core — parcel tracking, pickup points, rerouting"
    enabled: true
    transport: "streamable_http"
    url: "http://localhost:9797/mcp"
    sse_read_timeout: 5000
    auth_mode: "no_token"

  - id: "mcp-iot-tracking-demo"
    name: "IoT Tracking Demo MCP"
    description: "Simulated IoT service — live GPS snapshots, route geometry, hub events"
    enabled: true
    transport: "streamable_http"
    url: "http://localhost:9798/mcp"
    sse_read_timeout: 5000
    auth_mode: "no_token"
